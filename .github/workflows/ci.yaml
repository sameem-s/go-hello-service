name: CI — Build, Push, Update Manifests

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ github.repository_owner }}/go-hello-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

      - name: Clone manifest repo and update image tag
        env:
          MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.IMAGE_TAG }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          git clone https://$GITHUB_USERNAME:$MANIFEST_REPO_TOKEN@github.com/$GITHUB_USERNAME/go-hello-manifests.git
          cd go-hello-manifests

          wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

          yq e ".image.tag = \"$IMAGE_TAG\"" -i charts/go-hello-service/values.yaml

          git config user.email "ci-bot@github.com"
          git config user.name "CI Bot"
          git add charts/go-hello-service/values.yaml
          git commit -m "chore: update image tag to $IMAGE_TAG [skip ci]"
          git push
